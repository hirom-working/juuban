    body {

      background-color: #1a1a1a;
      color: #f0f0f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px;
    }

    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #f5f5f5;
      letter-spacing: 0.08em;
    }

    .subtitle {
      font-size: 1.1rem;
      color: #e0a878;
      margin-bottom: 40px;
    }

    .link-list {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .link-card {
      display: flex;
      align-items: center;
      background-color: #2a2a2a;
      border-radius: 16px;
      padding: 16px;
      text-decoration: none;
      color: #f0f0f0;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      border: 1px solid #3d3d3d;
    }

    .link-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(239, 93, 70, 0.2);
      background-color: #333333;
    }

    .icon-container {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-right: 16px;
    }

    .icon {
      width: 32px;
      height: 32px;
      fill: currentColor;
    }

    .link-text {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }

    .instagram {
      background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%);
      color: white;
      border: none;
    }
    .instagram .icon { fill: white; }

    .x {
      background-color: #000000;
      border: 1px solid #333333;
    }
    .x .icon { fill: #e0e0e0; }

    .tiktok {
      background-color: #000000;
      border: 1px solid #333333;
    }
    .tiktok .icon { fill: #25f4ee; }

    .footer {
      margin-top: 40px;
      font-size: 0.8rem;
      color: #777;
    }
  </style>
</head>
